<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calc()</title>
  </head>
  <body>
    <div class="container">
      <div class="screen">0</div>
      <div class="keys-container" id="keys-container">
        <div class="key ac function">AC</div>
        <div class="key function"><=</div>
        <div class="key function">÷</div>
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
        <div class="key function">×</div>
        <div class="key">4</div>
        <div class="key">5</div>
        <div class="key">6</div>
        <div class="key function">-</div>
        <div class="key">7</div>
        <div class="key">8</div>
        <div class="key">9</div>
        <div class="key function">+</div>
        <div class="key">.</div>
        <div class="key">0</div>
        <div class="key equals function">=</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
