<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calc()</title>
  </head>
  <body>
    <div class="container">
      <div class="screen">
        <div class="calculated"></div>
        <div class="hero">
          <span class="leftNum">0</span>
          <span class="sign"></span>
          <span class="rightNum"></span>
        </div>
      </div>
      <div class="keys-container" id="keys-container">
        <div class="key ac">AC</div>
        <div class="key delete"><=</div>
        <div class="key function">÷</div>
        <div class="key num">1</div>
        <div class="key num">2</div>
        <div class="key num">3</div>
        <div class="key function">×</div>
        <div class="key num">4</div>
        <div class="key num">5</div>
        <div class="key num">6</div>
        <div class="key function">-</div>
        <div class="key num">7</div>
        <div class="key num">8</div>
        <div class="key num">9</div>
        <div class="key function">+</div>
        <div class="key num">.</div>
        <div class="key num">0</div>
        <div class="key equals">=</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
